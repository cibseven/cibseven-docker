receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
  
  prometheus:
    config:
      scrape_configs:
        - job_name: 'cibseven'
          scrape_interval: 30s
          static_configs:
            - targets: ['camunda-opentelemetry:9464']
              labels:
                service: 'cibseven'

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug]
    metrics:
      receivers: [otlp, prometheus]
      exporters: [debug]
    logs:
      receivers: [otlp]
      exporters: [debug]
